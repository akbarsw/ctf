<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CTF - Tebak Gambar Cupang</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="badge">Beginner Web Challenge</p>
      <h1>Mini CTF: Tebak Gambar</h1>
      <p class="desc">Perhatikan gambar di bawah. Jawab dengan huruf kecil semua.</p>

      <div class="image-box">
        <img class="challenge-image" src="betta.svg" alt="Gambar ikan cupang">
      </div>

      <input id="answer" type="text" placeholder="Masukkan jawaban..." autocomplete="off">
      <button id="submitBtn">Submit</button>

      <p id="result"></p>
      <p class="hint">Hint: ikan hias kecil yang terkenal agresif dan warnanya cantik.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
