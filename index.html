<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CTF - Tebak Gambar Cupang</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="badge">Beginner Web Challenge</p>
      <h1>Mini CTF: Tebak Gambar</h1>
      <p class="desc">Perhatikan gambar di bawah. Jawab dengan huruf kecil semua.</p>

      <div class="image-box" aria-label="Gambar ikan cupang">
        <div class="aquarium">
          <div class="bubble bubble-one"></div>
          <div class="bubble bubble-two"></div>
          <div class="bubble bubble-three"></div>

          <div class="betta-fish">
            <div class="tail tail-top"></div>
            <div class="tail tail-bottom"></div>
            <div class="body-fish">
              <div class="eye"></div>
              <div class="fin fin-top"></div>
              <div class="fin fin-bottom"></div>
            </div>
          </div>
        </div>
      </div>

      <input id="answer" type="text" placeholder="Masukkan jawaban..." autocomplete="off">
      <button id="submitBtn">Submit</button>

      <p id="result"></p>
      <p class="hint">Hint: ikan hias kecil yang terkenal agresif dan warnanya cantik.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
