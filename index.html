<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini CTF - Multi Step Challenge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="badge">Beginner Web Challenge</p>
      <h1>Mini CTF: Multi Step</h1>
      <p class="step" id="step-indicator">Step 1/3</p>

      <div class="image-box" id="challenge-image">
        <img class="challenge-image" src="betta.svg" alt="Challenge Image">
      </div>

      <p class="desc" id="question">Perhatikan gambar di bawah. Apa yang ada di gambar ini?</p>

      <input id="answer" type="text" placeholder="Masukkan jawaban..." autocomplete="off">
      <button id="submitBtn">Submit</button>

      <p id="result"></p>
      <p class="hint" id="hint">Hint: ikan hias kecil yang terkenal agresif dan warnanya cantik.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
